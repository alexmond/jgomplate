name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml --no-transfer-progress

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/surefire-reports/TEST-*.xml

      - name: Add coverage to PR
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/target/site/jacoco/jacoco.xml'
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report-type: test_results
          files: |
            **/surefire-reports/TEST-*.xml

      - name: Report tests + coverage to UniTrack
        if: always()
        uses: alexmond/unitrack/action@v0
        with:
          url: ${{ vars.UNITRACK_URL }}
          token: ${{ secrets.UNITRACK_TOKEN }}
          junit: '**/surefire-reports/TEST-*.xml'
          jacoco: '**/jacoco.xml'
          split-by-module: "true"
          soft-fail: "true"

      # Disabled until the repo's Dependency graph is enabled in settings.
      # Re-enable per https://github.com/alexmond/jgomplate/issues/6
      # - name: Submit Dependency Snapshot
      #   uses: advanced-security/maven-dependency-submission-action@v5
