name: Maven Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: true
        default: 'main'
      releaseVersion:
        description: 'Release version'
        required: true
      nextVersion:
        description: 'Next development version (with -SNAPSHOT suffix)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the release commit + tag, create the GitHub release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Set Release Version
        env:
          RELEASE_VERSION: ${{ github.event.inputs.releaseVersion }}
        run: mvn versions:set -DnewVersion="${RELEASE_VERSION}" --no-transfer-progress

      - name: Verify Build
        run: mvn --batch-mode verify --no-transfer-progress

      - name: Commit and Tag Release
        env:
          RELEASE_VERSION: ${{ github.event.inputs.releaseVersion }}
        run: |
          git commit -am "Prepare release ${RELEASE_VERSION}"
          git tag -a "${RELEASE_VERSION}" -m "Release ${RELEASE_VERSION}"

      - name: Deploy to Maven Central
        run: mvn --batch-mode clean deploy -Prelease -Dgpg.passphrase="${GPG_PASSPHRASE}" --no-transfer-progress
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set Next Development Version
        env:
          NEXT_VERSION: ${{ github.event.inputs.nextVersion }}
        run: |
          mvn versions:set -DnewVersion="${NEXT_VERSION}" --no-transfer-progress
          git commit -am "Prepare for next development iteration: ${NEXT_VERSION}"

      - name: Push Changes
        env:
          RELEASE_BRANCH: ${{ github.event.inputs.branch }}
        run: git push origin "${RELEASE_BRANCH}" && git push origin --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.releaseVersion }}
          name: Release ${{ github.event.inputs.releaseVersion }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
